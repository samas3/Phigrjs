<!DOCTYPE html>
<html>
    <head>
        <title>Phigrjs</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="./css/style.css">
        <script src="./js/tween.js"></script>
        <script src="./js/bezier.js"></script>
        <script src="./js/pec2json.js"></script>
        <script src="./js/jszip.js"></script>
        <script src="./js/animation.js"></script>
        <script>
            const $ = s => document.querySelector(s);
        </script>
    </head>
    <body>
        <canvas id="main-canvas"></canvas>
        <div id="progress-container">
            <div>
                <span class="time">0:00</span>
                <input type="range" id="progress-bar" min="0" max="100" value="0">
                <span id="duration" class="time">0:00</span>
            </div>
            <div id="seek-time" class="time"></div>
        </div>
        <div id="selector">
            <h3>Phigrjs</h3>
            <div class="file-group">
                <label for="zip-file">Zip/Pez File (.zip/.pez)</label>
                <input type="file" id="zip-file" accept=".zip,.pez">
            </div>
            <hr>
            <div class="file-group">
                <label for="chart-file">Chart Info (.csv) (optional)</label>
                <input type="file" id="chart-file" accept=".csv">
            </div>
            <div class="file-group">
                <label for="data-file">Chart File (.json/.pec)</label>
                <input type="file" id="data-file" accept=".json,.pec">
            </div>
            <div class="file-group">
                <label for="music-file">Music File (.ogg/.mp3/.wav)</label>
                <input type="file" id="music-file" accept=".ogg,.mp3,.wav">
            </div>
            <div class="file-group">
                <label for="image-file">Image File (.png/.jpg/.jpeg)</label>
                <input type="file" id="image-file" accept=".png,.jpg,.jpeg">
            </div>
            <button id="load-button">Start!</button>
            <button id="settings-button">Settings</button>
        </div>
        
        <div id="settings-modal">
            <div>
                <h3>Settings</h3>
                <div class="setting-row">
                    <div class="setting-item">
                        <label>
                            <input type="checkbox" id="showFps"> Show FPS
                        </label>
                    </div>
                    <div class="setting-item">
                        <label>
                            <input type="checkbox" id="hlEffect" checked> HL Effect
                        </label>
                    </div>
                    <div class="setting-item">
                        <label>
                            <input type="checkbox" id="hitEffect" checked> Hit Effect
                        </label>
                    </div>
                    <div class="setting-item">
                        <label>
                            <input type="checkbox" id="autoPlay" checked> AutoPlay
                        </label>
                    </div>
                    <div class="setting-item">
                        <label>
                            <input type="checkbox" id="showAcc" checked> Show Accuracy
                        </label>
                    </div>
                </div>
                <div class="setting-row">
                    <div class="setting-item">
                        <label>
                            <input type="checkbox" id="showTiming" checked> Show Timing
                        </label>
                    </div>
                    <div class="setting-item">
                        <label>
                            <input type="checkbox" id="showHitPoint"> Show Hit Point
                        </label>
                    </div>
                    <div class="setting-item">
                        <label>
                            Tracing <input id="traceID" type="text">
                        </label>
                    </div>
                    <div class="setting-item">
                        <label>
                            Max FPS <input id="maxFps" type="number" value="60">
                        </label>
                    </div>
                </div>
                <button id="close-settings">Close</button>
            </div>
        </div>

        <div id="loading-overlay">
            <div class="loading-content">
                <div class="loading-spinner"></div>
                <p id="loading-message">Loading...</p>
            </div>
        </div>

        <script src="./main.js"></script>
    </body>
</html>
