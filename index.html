<!DOCTYPE html>
<html>
    <head>
        <title>Phigrjs</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <style>
            body {
                padding: 0;
                border: 0;
                margin: 0;
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
            }

            #main-canvas {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                height: 100%;
            }

            #selector {
                z-index: 10;
                background-color: rgba(255, 255, 255, 0.95);
                padding: 24px;
                border-radius: 16px;
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
                backdrop-filter: blur(10px);
                border: 1px solid rgba(0, 0, 0, 0.05);
                min-width: 320px;
                max-width: 400px;
                width: 100%;
            }

            #selector h3 {
                margin: 0 0 20px 0;
                color: #333;
                font-size: 18px;
                font-weight: 600;
                text-align: center;
            }

            .file-group {
                margin-bottom: 16px;
            }

            .file-group label {
                display: block;
                margin-bottom: 8px;
                color: #555;
                font-size: 14px;
                font-weight: 500;
            }

            .file-group input[type="file"] {
                width: 100%;
                padding: 10px 14px;
                border: 1px solid #e1e5e9;
                border-radius: 10px;
                font-size: 13px;
                color: #666;
                background-color: #fafafa;
                transition: all 0.2s ease;
                box-sizing: border-box;
            }

            .file-group input[type="file"]:hover {
                border-color: #d1d5da;
                background-color: #f5f5f5;
            }

            .file-group input[type="file"]:focus {
                outline: none;
                border-color: #3b82f6;
                box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            }

            #load-button {
                width: 100%;
                padding: 14px;
                background-color: #3b82f6;
                color: white;
                border: none;
                border-radius: 10px;
                font-size: 15px;
                font-weight: 500;
                cursor: pointer;
                transition: all 0.2s ease;
                margin-top: 4px;
            }

            #load-button:hover {
                background-color: #2563eb;
                transform: translateY(-1px);
                box-shadow: 0 6px 20px rgba(59, 130, 246, 0.25);
            }

            #load-button:active {
                transform: translateY(0);
            }

            #settings-button {
                width: 100%;
                padding: 14px;
                background-color: #3b82f6;
                color: white;
                border: none;
                border-radius: 10px;
                font-size: 15px;
                font-weight: 500;
                cursor: pointer;
                margin-top: 12px;
                transition: all 0.2s ease;
            }

            #settings-button:hover {
                background-color: #2563eb;
                transform: translateY(-1px);
                box-shadow: 0 6px 20px rgba(59, 130, 246, 0.25);
            }

            #settings-button:active {
                transform: translateY(0);
            }

            #settings-modal {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-color: rgba(0,0,0,0.5);
                z-index: 20;
                justify-content: center;
                align-items: center;
            }

            #settings-modal > div {
                background-color: rgba(255, 255, 255, 0.95);
                padding: 24px;
                border-radius: 16px;
                width: 80%;
                max-width: 500px;
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
                backdrop-filter: blur(10px);
                border: 1px solid rgba(0, 0, 0, 0.05);
            }

            #settings-modal h3 {
                margin: 0 0 20px 0;
                color: #333;
                font-size: 18px;
                font-weight: 600;
                text-align: center;
            }

            .setting-group {
                margin-bottom: 16px;
            }

            .setting-group label {
                display: block;
                margin-bottom: 8px;
                color: #555;
                font-size: 14px;
                font-weight: 500;
            }

            .setting-group input[type="checkbox"] {
                width: auto;
                margin-right: 8px;
            }

            .setting-row {
                display: flex;
                gap: 16px;
                margin-bottom: 16px;
            }

            .setting-item {
                flex: 1;
                display: flex;
                align-items: center;
            }

            .setting-item label {
                margin-bottom: 0;
                display: flex;
                align-items: center;
                font-size: 14px;
                color: #555;
                font-weight: 500;
            }

            .setting-item input[type="checkbox"] {
                margin-right: 8px;
                width: auto;
            }

            #close-settings {
                width: 100%;
                padding: 14px;
                background-color: #3b82f6;
                color: white;
                border: none;
                border-radius: 10px;
                font-size: 15px;
                font-weight: 500;
                cursor: pointer;
                margin-top: 20px;
            }

            #close-settings:hover {
                background-color: #2563eb;
                transform: translateY(-1px);
                box-shadow: 0 6px 20px rgba(59, 130, 246, 0.25);
            }

            #close-settings:active {
                transform: translateY(0);
            }

            #loading-overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-color: rgba(0,0,0,0.5);
                z-index: 15;
                justify-content: center;
                align-items: center;
            }

            .loading-content {
                background-color: rgba(255, 255, 255, 0.95);
                padding: 32px;
                border-radius: 16px;
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
                backdrop-filter: blur(10px);
                border: 1px solid rgba(0, 0, 0, 0.05);
                text-align: center;
                min-width: 200px;
            }

            .loading-spinner {
                width: 40px;
                height: 40px;
                margin: 0 auto 16px;
                border: 4px solid rgba(59, 130, 246, 0.2);
                border-radius: 50%;
                border-top-color: #3b82f6;
                animation: spin 1s linear infinite;
            }

            .loading-content p {
                margin: 0;
                color: #333;
                font-size: 16px;
                font-weight: 500;
            }

            @keyframes spin {
                to { transform: rotate(360deg); }
            }
        </style>
        <script src="/tween.js"></script>
        <script src="/pec2json.js"></script>
    </head>
    <body>
        <canvas id="main-canvas"></canvas>
        <div id="selector">
            <h3>Phigrjs</h3>
            <div class="file-group">
                <label for="chart-file">Chart Info (.csv) (optional)</label>
                <input type="file" id="chart-file" accept=".csv">
            </div>
            <div class="file-group">
                <label for="data-file">Chart File (.json/.pec)</label>
                <input type="file" id="data-file" accept=".json,.pec">
            </div>
            <div class="file-group">
                <label for="music-file">Music File (.ogg/.mp3/.wav)</label>
                <input type="file" id="music-file" accept=".ogg,.mp3,.wav">
            </div>
            <div class="file-group">
                <label for="image-file">Image File (.png/.jpg/.jpeg)</label>
                <input type="file" id="image-file" accept=".png,.jpg,.jpeg">
            </div>
            <button id="load-button">Start!</button>
            <button id="settings-button">Settings</button>
        </div>
        
        <div id="settings-modal">
            <div>
                <h3>Settings</h3>
                <div class="setting-row">
                    <div class="setting-item">
                        <label>
                            <input type="checkbox" id="showFps"> Show FPS
                        </label>
                    </div>
                    <div class="setting-item">
                        <label>
                            <input type="checkbox" id="hlEffect" checked> HL Effect
                        </label>
                    </div>
                </div>
                <div class="setting-row">
                    <div class="setting-item">
                        <label>
                            <input type="checkbox" id="showTiming"> Show Timing
                        </label>
                    </div>
                    <div class="setting-item">
                        <label>
                            <input type="checkbox" id="showHitPoint"> Show Hit Point
                        </label>
                    </div>
                </div>
                <button id="close-settings">Close</button>
            </div>
        </div>

        <div id="loading-overlay">
            <div class="loading-content">
                <div class="loading-spinner"></div>
                <p id="loading-message">Loading...</p>
            </div>
        </div>

        <script src="/main.js"></script>
    </body>
</html>
