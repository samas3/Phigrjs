<!DOCTYPE html>
<html>
    <head>
        <title>Phigrjs</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <style>
            body {
                padding: 0;
                border: 0;
                margin: 0;
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
            }

            #main-canvas {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                height: 100%;
            }

            #selector {
                z-index: 10;
                background-color: rgba(255, 255, 255, 0.95);
                padding: 24px;
                border-radius: 16px;
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
                backdrop-filter: blur(10px);
                border: 1px solid rgba(0, 0, 0, 0.05);
                min-width: 320px;
                max-width: 400px;
                width: 100%;
            }

            #selector h3 {
                margin: 0 0 20px 0;
                color: #333;
                font-size: 18px;
                font-weight: 600;
                text-align: center;
            }

            .file-group {
                margin-bottom: 16px;
            }

            .file-group label {
                display: block;
                margin-bottom: 8px;
                color: #555;
                font-size: 14px;
                font-weight: 500;
            }

            .file-group input[type="file"] {
                width: 100%;
                padding: 10px 14px;
                border: 1px solid #e1e5e9;
                border-radius: 10px;
                font-size: 13px;
                color: #666;
                background-color: #fafafa;
                transition: all 0.2s ease;
                box-sizing: border-box;
            }

            .file-group input[type="file"]:hover {
                border-color: #d1d5da;
                background-color: #f5f5f5;
            }

            .file-group input[type="file"]:focus {
                outline: none;
                border-color: #3b82f6;
                box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            }

            #load-button {
                width: 100%;
                padding: 14px;
                background-color: #3b82f6;
                color: white;
                border: none;
                border-radius: 10px;
                font-size: 15px;
                font-weight: 500;
                cursor: pointer;
                transition: all 0.2s ease;
                margin-top: 4px;
            }

            #load-button:hover {
                background-color: #2563eb;
                transform: translateY(-1px);
                box-shadow: 0 6px 20px rgba(59, 130, 246, 0.25);
            }

            #load-button:active {
                transform: translateY(0);
            }
        </style>
        <script src="/pec2json.js"></script>
    </head>
    <body>
        <canvas id="main-canvas"></canvas>
        <div id="selector">
            <h3>Phigrjs</h3>
            <div class="file-group">
                <label for="chart-file">Chart Info (.csv) (optional)</label>
                <input type="file" id="chart-file" accept=".csv">
            </div>
            <div class="file-group">
                <label for="data-file">Chart File (.json/.pec)</label>
                <input type="file" id="data-file" accept=".json,.pec">
            </div>
            <div class="file-group">
                <label for="music-file">Music File (.ogg/.mp3/.wav)</label>
                <input type="file" id="music-file" accept=".ogg,.mp3,.wav">
            </div>
            <div class="file-group">
                <label for="image-file">Image File (.png/.jpg/.jpeg)</label>
                <input type="file" id="image-file" accept=".png,.jpg,.jpeg">
            </div>
            <button id="load-button">Start!</button>
        </div>
        <script src="/main.js"></script>
    </body>
</html>
